<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">{{ studentName }} Portfolio</a>
  </div>
</nav>

<div class="container">
  <div class="p-5 mb-4 bg-light rounded-3 border">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">Hello, {{ studentName }}!</h1>
      <p class="col-md-8 fs-4">Welcome to my professional portfolio </p>
      
      <img [src]="profileImage" alt="Profile" class="img-thumbnail rounded-circle mb-3" style="width: 150px;">
      
      <div class="mt-3">
        <button (click)="onButtonClick()" class="btn btn-primary btn-lg me-2">Click Me</button>
        
        <button [disabled]="isDisabled" class="btn btn-secondary btn-lg">Disabled Action</button>
      </div>

      <p class="mt-3 text-success fw-bold">{{ message }}</p>
    </div>
  </div>
</div>
